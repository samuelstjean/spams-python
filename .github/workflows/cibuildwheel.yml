name: Build and upload to PyPI

# Build on every branch push, tag push, and pull request change:
# on: [push, pull_request]
# Alternatively, to publish when a (published) GitHub Release is created, use the following:
on:
  push:
  pull_request:
  release:
    types:
      - published

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-18.04, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v2

      # - name: Setup Miniconda
      #   uses: conda-incubator/setup-miniconda@v2.1.1
      #   with:
      #     activate-environment: openblas
      #     auto-activate-base: false
      #     channels: conda-forge

      - uses: actions/setup-python@v2
        name: Install Python
        with:
          python-version: '3.7'

      - name: Install cibuildwheel
        run: |
          python -m pip install cibuildwheel==1.10.0

      - name: Build wheels
        env:
          CIBW_SKIP: "*-win32 *-manylinux_i686 pp* cp27-* cp35-* cp36-*"
                                            # --no-mangle mkl_core.1.dll
                                            # --add-dll libiomp5md.dll
                                            # --add-path c:\cibw\intelmkl.redist.win-x64.2020.1.216\runtimes\win-x64\native;c:\cibw\intelopenmp.redist.win.2021.3.0.3372\runtimes\win-x64\native
                                            # --add-path c:\cibw\intelopenmp.redist.win.2021.3.0.3372\runtimes\win-x64\native
                                            # --extract-dir C:\cibw\out
          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: >
                                            delvewheel show {wheel} &&
                                            delvewheel repair -w {dest_dir} {wheel} --add-path c:\cibw\intelopenmp.redist.win.2021.3.0.3372\runtimes\win-x64\native &&
                                            dir C:\cibw\out\spams_bin.libs

                                    #  pip install delvewheel && conda install openblas libopenblas && dir C:\Miniconda\envs\openblas\Library\lib
          CIBW_BEFORE_BUILD_WINDOWS: >
                                     pip install delvewheel &&
                                     nuget install intelmkl.static.win-x64  -Version 2021.3.0.524  -OutputDirectory C:\cibw &&
                                     nuget install intelopenmp.devel.win  -Version 2021.3.0.3372 -OutputDirectory C:\cibw &&
          CIBW_BEFORE_BUILD_LINUX: yum install openblas-devel lapack-devel -y
          CIBW_BEFORE_BUILD_MACOS: brew install openblas

          CIBW_TEST_COMMAND: python {package}/test/test_spams.py
          # CIBW_TEST_COMMAND_WINDOWS: '' # Because it requires the mkl dll, seems like we can't run it since it gets separated when testing from the build env :/
        run: |
          python -m cibuildwheel --output-dir wheelhouse

      - uses: actions/upload-artifact@v2
        with:
          path: ./wheelhouse/*.whl


  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - uses: actions/setup-python@v2
        name: Install Python
        with:
          python-version: '3.7'

      - name: Build sdist
        run: |
          python -m pip install numpy distro
          python setup.py sdist

      - uses: actions/upload-artifact@v2
        with:
          path: dist/*.tar.gz

  upload_pypi:
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    # upload to PyPI on every tag starting with 'v'
    # if: github.event_name == 'push' && startsWith(github.event.ref, 'refs/tags/v')
    # alternatively, to publish when a GitHub Release is created, use the following rule:
    if: github.event_name == 'release' && github.event.action == 'published'
    steps:
      - uses: actions/download-artifact@v2
        with:
          name: artifact
          path: dist

      - uses: pypa/gh-action-pypi-publish@v1.4.1
        with:
          user: __token__
          password: ${{ secrets.pypi_password }}
          # password: ${{ secrets.testpypi_password }}
          # repository_url: https://test.pypi.org/legacy/
